version: '3'

volumes:
  prometheus_data:
      name: prometheus_data
          driver: local

graf_data:
  name: prometheus_data
  driver: local

networks:
  monitoring:
    name: monitoring

services:
  prometheus:
    container_name: prometheus
    image:prom/prometheus
    restart: uniless-stopped
    volumes:
      -'prometheus_data:/prometheus'
      -'./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml'
    network:
      -monitoring
    ports:
      -9090:9090
  snmp-exporter:

grafana